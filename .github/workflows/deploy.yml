name: Deploy standalone game to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: game/package-lock.json

      - name: Install dependencies
        working-directory: game
        run: npm ci

      - name: Build standalone game
        working-directory: game
        run: npm run build

      - name: Prepare GitHub Pages output
        working-directory: game
        run: |
          test -f dist/index.html || cp dist/standalone.html dist/index.html
          echo "mayphex.com" > dist/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./game/dist
          cname: mayphex.com
